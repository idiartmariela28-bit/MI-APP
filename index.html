<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EgoScan Mastery v2</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; margin: 0; font-family: sans-serif; }
        #root { min-height: 100vh; display: flex; flex-direction: column; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.1); }
    </style>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const { Radar, RadarChart, PolarGrid, PolarAngleAxis, ResponsiveContainer } = window.Recharts;

        // CONFIGURACIÓN DE HERIDAS
        const WOUNDS = {
            rechazo: { n: "Rechazo", c: "#6366f1", m: "Huidizo" },
            abandono: { n: "Abandono", c: "#ec4899", m: "Dependiente" },
            humillacion: { n: "Humillación", c: "#f59e0b", m: "Masoquista" },
            traicion: { n: "Traición", c: "#ef4444", m: "Controlador" },
            injusticia: { n: "Injusticia", c: "#10b981", m: "Rígido" }
        };

        function App() {
            const [view, setView] = useState('home');
            const [result, setResult] = useState(null);

            // Simulación de respuesta para ver el gráfico rápido
            const finishTest = (key) => {
                const data = Object.keys(WOUNDS).map(k => ({
                    subject: WOUNDS[k].n,
                    value: k === key ? 10 : Math.floor(Math.random() * 5) + 2
                }));
                setResult({ key, data });
                setView('results');
            };

            return (
                <div className="max-w-md mx-auto w-full bg-white min-h-screen flex flex-col shadow-xl">
                    {/* Header */}
                    <header className="p-6 border-b flex justify-between items-center bg-slate-900 text-white">
                        <h1 className="font-bold tracking-tighter italic">EGOSCAN v2</h1>
                        {view !== 'home' && <button onClick={() => setView('home')} className="text-xs bg-slate-700 px-2 py-1 rounded">INICIO</button>}
                    </header>

                    <main className="p-6 flex-1">
                        {view === 'home' && (
                            <div className="space-y-6 text-center py-10">
                                <h2 className="text-3xl font-black text-slate-800 uppercase">¿Cuál es tu herida?</h2>
                                <p className="text-slate-500">Haz clic en el área que quieras explorar:</p>
                                <div className="grid gap-4">
                                    <button onClick={() => finishTest('rechazo')} className="p-6 border-2 border-indigo-100 rounded-2xl hover:bg-indigo-50 font-bold text-indigo-600">ÁREA PERSONAL</button>
                                    <button onClick={() => finishTest('traicion')} className="p-6 border-2 border-red-100 rounded-2xl hover:bg-red-50 font-bold text-red-600">ÁREA PAREJA</button>
                                    <button onClick={() => finishTest('injusticia')} className="p-6 border-2 border-emerald-100 rounded-2xl hover:bg-emerald-50 font-bold text-emerald-600">ÁREA LABORAL</button>
                                </div>
                            </div>
                        )}

                        {view === 'results' && result && (
                            <div className="space-y-6 animate-in fade-in duration-500">
                                <div className="text-center">
                                    <span className="text-xs font-black text-slate-400 uppercase tracking-widest">Resultado Principal</span>
                                    <h2 className="text-4xl font-black text-slate-900 uppercase italic">Herida de {WOUNDS[result.key].n}</h2>
                                </div>

                                {/* GRÁFICO (El punto donde fallaba) */}
                                <div className="h-64 w-full bg-slate-50 rounded-3xl p-4 border border-slate-100">
                                    <ResponsiveContainer width="100%" height="100%">
                                        <RadarChart data={result.data}>
                                            <PolarGrid stroke="#cbd5e1" />
                                            <PolarAngleAxis dataKey="subject" tick={{fontSize: 10, fontWeight: 'bold'}} />
                                            <Radar 
                                                name="Nivel" 
                                                dataKey="value" 
                                                stroke={WOUNDS[result.key].c} 
                                                fill={WOUNDS[result.key].c} 
                                                fillOpacity={0.6} 
                                            />
                                        </RadarChart>
                                    </ResponsiveContainer>
                                </div>

                                <div className="p-6 bg-slate-900 text-white rounded-[2rem]">
                                    <p className="italic opacity-80 text-sm mb-2 uppercase font-bold tracking-widest">Máscara:</p>
                                    <p className="text-2xl font-black text-indigo-300">{WOUNDS[result.key].m}</p>
                                </div>

                                <button onClick={() => setView('home')} className="w-full p-4 font-bold text-slate-400 hover:text-slate-800">CERRAR</button>
                            </div>
                        )}
                    </main>

                    <footer className="p-6 text-center border-t">
                        <p className="text-[9px] text-slate-300 font-bold tracking-[0.4em] uppercase">EgoScan Mastery • 2026</p>
                    </footer>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
