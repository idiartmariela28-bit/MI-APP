<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EgoScan Mastery v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>
    
    <style>
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in {
            animation: fadeIn 0.5s ease-out forwards;
        }
    </style>
</head>
<body class="bg-slate-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;
        // Acceso correcto a Recharts desde el objeto global
        const {
            Radar,
            RadarChart,
            PolarGrid,
            PolarAngleAxis,
            ResponsiveContainer
        } = window.Recharts;

        // --- CONFIGURACIÓN DE LAS 5 HERIDAS Y ESCENARIOS ---
        // (He mantenido tu configuración intacta para no alterar la lógica del test)
        const WOUNDS_CONFIG = {
            rechazo: { name: "Rechazo", mask: "Huidizo", survivalResponse: "Huir", survivalDesc: "Tu sistema nervioso entra en modo escape. Buscas desaparecer...", color: "#6366f1", longDesc: "Esta herida golpea el derecho fundamental a EXISTIR...", genesis: "Se origina desde la concepción...", awareness: "Tu sanación comienza al validar que tienes derecho a ocupar espacio...", fear: "El Pánico a la invisibilidad.", healingKey: "Validar tu derecho a ocupar espacio.", oppositeAction: "Quedarte y ocupar tu espacio.", reframe: "Merezco estar aquí." },
            abandono: { name: "Abandono", mask: "Dependiente", survivalResponse: "Reaccionar", survivalDesc: "Buscas conexión de forma ansiosa...", color: "#ec4899", longDesc: "Nace de una falta de nutrición afectiva...", genesis: "Surge entre el primer y tercer año...", awareness: "Tu hambre de atención es falta de auto-apoyo...", fear: "La Soledad absoluta.", healingKey: "Autonomía emocional.", oppositeAction: "Pasar tiempo a solas de calidad.", reframe: "Yo me acompaño." },
            humillacion: { name: "Humillación", mask: "Masoquista", survivalResponse: "Paralizarse", survivalDesc: "Te bloqueas y absorbes el impacto...", color: "#f59e0b", longDesc: "Es la herida de la LIBERTAD...", genesis: "Se despierta con el control de esfínteres...", awareness: "Te has convertido en el salvador de todos...", fear: "La Libertad de ser tú mismo.", healingKey: "Darse permiso para el placer.", oppositeAction: "Priorizar una necesidad propia.", reframe: "Tengo derecho a disfrutar." },
            traicion: { name: "Traición", mask: "Controlador", survivalResponse: "Reaccionar", survivalDesc: "Modo lucha/combate...", color: "#ef4444", longDesc: "Es la herida de la CONFIANZA...", genesis: "Se desarrolla entre los dos y cuatro años...", awareness: "Tu necesidad de control es un escudo...", fear: "La Vulnerabilidad.", healingKey: "Soltar la previsión total.", oppositeAction: "Delegar sin supervisar.", reframe: "Confío en el flujo de la vida." },
            injusticia: { name: "Injusticia", mask: "Rígido", survivalResponse: "Paralizarse", survivalDesc: "Te vuelves frío y cuadriculado...", color: "#10b981", longDesc: "Es la herida del SENTIR...", genesis: "Entre los cuatro y seis años...", awareness: "Has dejado de vivir para empezar a rendir...", fear: "La Imperfección.", healingKey: "Reconectar con la sensibilidad.", oppositeAction: "Aceptar un error propio.", reframe: "Soy humano y puedo fallar." }
        };

        const SCENARIOS = {
            personal: [
                { q: "Alguien critica una decisión que tomaste con mucha ilusión...", options: [{ t: "Me retiro y me callo", w: "rechazo" }, { t: "Busco que me entiendan desesperadamente", w: "abandono" }, { t: "Me siento culpable y pequeño", w: "humillacion" }, { t: "Ataco de vuelta cuestionando su vida", w: "traicion" }, { t: "Argumento lógicamente por qué es perfecta", w: "injusticia" }] },
                // ... (Puedes completar con el resto de tus escenarios aquí)
            ],
            pareja: [
                { q: "Tu pareja te pide un tiempo para pensar...", options: [{ t: "Me alejo y no llamo nunca más", w: "rechazo" }, { t: "Suplico desesperadamente", w: "abandono" }, { t: "Me lo merezco", w: "humillacion" }, { t: "Pienso que tiene a otra persona", w: "traicion" }, { t: "Es una falta de ética", w: "injusticia" }] }
            ],
            laboral: [
                { q: "Tu jefe pide corregir un trabajo delante de otros...", options: [{ t: "Quiero renunciar", w: "rechazo" }, { t: "Temo que no confíe en mí", w: "abandono" }, { t: "Me siento el más torpe", w: "humillacion" }, { t: "Quiere humillarme", w: "traicion" }, { t: "Me enfurezco por la imperfección", w: "injusticia" }] }
            ]
        };

        const TEST_QUESTIONS = [
            { q: "¿Cuánto dura aproximadamente el pico de química emocional?", options: ["15 segundos", "90 segundos", "10 minutos"], correct: 1 },
            { q: "¿Cuál es el objetivo del 'Etiquetado Cognitivo'?", options: ["Sentir más", "Activar la Corteza Prefrontal", "Culpar"], correct: 1 },
            { q: "Si mi respuesta es 'Huir', ¿cuál es mi Acción Alternativa?", options: ["Correr", "Quedarme y ocupar espacio", "Ignorar"], correct: 1 }
        ];

        // --- ICONOS (Simples con Emoji para evitar fallos de carga) ---
        const Brain = () => <span>🧠</span>;
        const Heart = () => <span>❤️</span>;
        const User = () => <span>👤</span>;
        const Briefcase = () => <span>💼</span>;
        const ChevronRight = () => <span>›</span>;
        const RotateCcw = () => <span>↺</span>;
        const History = () => <span>🕘</span>;
        const Shield = () => <span>🛡️</span>;
        const Zap = () => <span>⚡</span>;
        const ZapOff = () => <span>💨</span>;
        const Snowflake = () => <span>❄️</span>;
        const Flame = () => <span>🔥</span>;
        const BookOpen = () => <span>📘</span>;
        const ArrowLeft = () => <span>←</span>;
        const Baby = () => <span>👶</span>;
        const Compass = () => <span>🧭</span>;
        const Quote = () => <span>"</span>;
        const Activity = () => <span>📈</span>;
        const AlertCircle = () => <span>⚠️</span>;
        const CheckCircle = () => <span>✅</span>;
        const Target = () => <span>🎯</span>;
        const Clock = () => <span>⏰</span>;
        const Wind = () => <span>🌬️</span>;
        const UserCheck = () => <span>🙋</span>;
        const Award = () => <span>🏆</span>;
        const Sparkles = () => <span>✨</span>;
        const Anchor = () => <span>⚓</span>;

        function cn(...classes) { return classes.filter(Boolean).join(" "); }

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [view, setView] = useState('home');
            const [scope, setScope] = useState(null);
            const [step, setStep] = useState(0);
            const [answers, setAnswers] = useState([]);
            const [results, setResults] = useState(null);
            const [detailedWound, setDetailedWound] = useState(null);
            const [testScore, setTestScore] = useState(0);
            const [testStep, setTestStep] = useState(0);

            useEffect(() => {
                const saved = localStorage.getItem('egoscan_v2');
                if (saved) setResults(JSON.parse(saved));
            }, []);

            const startQuiz = (s) => { setScope(s); setStep(0); setAnswers([]); setView('quiz'); };

            const handleOption = (w) => {
                const newAnswers = [...answers, w];
                if (step < SCENARIOS[scope].length - 1) {
                    setAnswers(newAnswers);
                    setStep(step + 1);
                } else {
                    const counts = { rechazo: 0, abandono: 0, humillacion: 0, traicion: 0, injusticia: 0 };
                    newAnswers.forEach(ans => counts[ans]++);
                    const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
                    const main = sorted[0][0];
                    const res = {
                        main, counts, 
                        allScores: Object.entries(counts).map(([k,v])=>({ subject: WOUNDS_CONFIG[k].name, value: v }))
                    };
                    setResults(res);
                    localStorage.setItem('egoscan_v2', JSON.stringify(res));
                    setView('results');
                }
            };

            const handleTest = (idx) => {
                if (idx === TEST_QUESTIONS[testStep].correct) setTestScore(prev => prev + 1);
                if (testStep < TEST_QUESTIONS.length - 1) setTestStep(testStep + 1);
                else setView('testResults');
            };

            return (
                <div className="w-full max-w-2xl mx-auto min-h-screen bg-white flex flex-col font-sans border-x shadow-xl">
                    <header className="p-4 border-b flex items-center justify-between sticky top-0 bg-white/95 z-50">
                        <div className="flex items-center gap-2">
                            <div className="bg-slate-900 text-white p-2 rounded-lg"><Brain /></div>
                            <span className="font-bold text-slate-800">EgoScan Mastery v2</span>
                        </div>
                        {view !== 'home' && <button onClick={()=>setView('home')} className="text-slate-400"><RotateCcw /></button>}
                    </header>

                    <main className="flex-1 p-6">
                        {view === 'home' && (
                            <div className="space-y-8 animate-fade-in">
                                <div className="space-y-2">
                                    <h1 className="text-4xl font-black text-slate-900">Tu Mapa <span className="text-indigo-600">Emocional</span>.</h1>
                                    <p className="text-slate-500 text-lg">Detecta tu Herida y tu Mecanismo de Supervivencia.</p>
                                </div>
                                <div className="grid gap-4">
                                    {['personal', 'pareja', 'laboral'].map(id => (
                                        <button key={id} onClick={()=>
