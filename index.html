<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EgoScan Mastery v2</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts/umd/Recharts.js"></script>

    <style>
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fadeIn 0.5s ease-in; }
    </style>
</head>
<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel">
        // 2. EXTRACCIÓN SEGURA DE COMPONENTES
        const { useState, useEffect } = React;
        
        // Esta es la parte que hacía que se quedara en blanco: 
        // En el navegador, Recharts vive dentro de window.Recharts
        const {
            Radar,
            RadarChart,
            PolarGrid,
            PolarAngleAxis,
            ResponsiveContainer
        } = window.Recharts;

        // --- TU CONFIGURACIÓN (REDUCIDA PARA EL EJEMPLO, MANTÉN LA TUYA COMPLETA) ---
        const WOUNDS_CONFIG = {
            rechazo: { name: "Rechazo", mask: "Huidizo", survivalResponse: "Huir", color: "#6366f1", oppositeAction: "Quedarte y ocupar tu espacio." },
            abandono: { name: "Abandono", mask: "Dependiente", survivalResponse: "Reaccionar", color: "#ec4899", oppositeAction: "Pasar tiempo a solas." },
            humillacion: { name: "Humillación", mask: "Masoquista", survivalResponse: "Paralizarse", color: "#f59e0b", oppositeAction: "Priorizar una necesidad propia." },
            traicion: { name: "Traición", mask: "Controlador", survivalResponse: "Reaccionar", color: "#ef4444", oppositeAction: "Delegar sin supervisar." },
            injusticia: { name: "Injusticia", mask: "Rígido", survivalResponse: "Paralizarse", color: "#10b981", oppositeAction: "Aceptar un error propio." }
        };

        const SCENARIOS = {
            personal: [
                { q: "Alguien critica una decisión que tomaste con mucha ilusión...", options: [{ t: "Me retiro y me callo", w: "rechazo" }, { t: "Busco que me entiendan", w: "abandono" }, { t: "Me siento culpable", w: "humillacion" }, { t: "Ataco de vuelta", w: "traicion" }, { t: "Argumento lógicamente", w: "injusticia" }] }
            ]
        };

        // --- COMPONENTE PRINCIPAL ---
        function App() {
            const [view, setView] = useState('home');
            const [results, setResults] = useState(null);

            return (
                <div className="max-w-xl mx-auto min-h-screen bg-white shadow-2xl flex flex-col font-sans">
                    <header className="p-4 border-b bg-slate-900 text-white flex justify-between items-center">
                        <span className="font-black italic">EGOSCAN MASTERY V2</span>
                        {view !== 'home' && <button onClick={() => setView('home')}>↺</button>}
                    </header>

                    <main className="flex-1 p-6 animate-fade-in">
                        {view === 'home' && (
                            <div className="space-y-8">
                                <h1 className="text-4xl font-black text-slate-800">Tu Mapa <span className="text-indigo-600">Emocional</span></h1>
                                <button 
                                    onClick={() => setView('quiz')}
                                    className="w-full p-8 bg-indigo-50 border-2 border-indigo-200 rounded-3xl text-2xl font-black text-indigo-700 hover:bg-indigo-100 transition-all"
                                >
                                    EMPEZAR TEST
                                </button>
                                {results && (
                                    <div className="p-4 bg-slate-100 rounded-xl text-center">
                                        Dominio actual: <strong>{WOUNDS_CONFIG[results.main].name}</strong>
                                    </div>
                                )}
                            </div>
                        )}

                        {view === 'quiz' && (
                            <div className="space-y-6">
                                <h2 className="text-2xl font-bold">{SCENARIOS.personal[0].q}</h2>
                                {SCENARIOS.personal[0].options.map((opt, i) => (
                                    <button 
                                        key={i} 
                                        onClick={() => {
                                            const res = { main: opt.w, allScores: [
                                                { subject: 'Rechazo', value: opt.w === 'rechazo' ? 10 : 2 },
                                                { subject: 'Abandono', value: opt.w === 'abandono' ? 10 : 3 },
                                                { subject: 'Humillación', value: opt.w === 'humillacion' ? 10 : 4 },
                                                { subject: 'Traición', value: opt.w === 'traicion' ? 10 : 2 },
                                                { subject: 'Injusticia', value: opt.w === 'injusticia' ? 10 : 5 }
                                            ]};
                                            setResults(res);
                                            setView('results');
                                        }}
                                        className="w-full p-4 text-left border-2 rounded-2xl hover:border-indigo-600 transition-all"
                                    >
                                        {opt.t}
                                    </button>
                                ))}
                            </div>
                        )}

                        {view === 'results' && results && (
                            <div className="space-y-6 text-center">
                                <h2 className="text-3xl font-black uppercase tracking-tighter">Herida de {WOUNDS_CONFIG[results.main].name}</h2>
                                <div style={{ width: '100%', height: 300 }}>
                                    <ResponsiveContainer>
                                        <RadarChart data={results.allScores}>
                                            <PolarGrid />
                                            <PolarAngleAxis dataKey="subject" />
                                            <Radar dataKey="value" stroke={WOUNDS_CONFIG[results.main].color} fill={WOUNDS_CONFIG[results.main].color} fillOpacity={0.6} />
                                        </RadarChart>
                                    </ResponsiveContainer>
                                </div>
                                <div className="p-6 bg-slate-900 text-white rounded-3xl">
                                    <h3 className="font-bold mb-2">Acción de Sanación:</h3>
                                    <p className="italic text-indigo-200">{WOUNDS_CONFIG[results.main].oppositeAction}</p>
                                </div>
                                <button onClick={() => setView('home')} className="w-full p-4 bg-slate-200 rounded-2xl font-bold uppercase">Volver al inicio</button>
                            </div>
                        )}
                    </main>

                    <footer className="p-4 text-center text-[10px] text-slate-400 uppercase tracking-widest">
                        EgoScan Mastery • 2026
                    </footer>
                </div>
            );
        }

            // 3. RENDERIZADO FINAL
        const root = ReactDOM.createRoot(document.getElementById("root"));
        root.render(<App />);
    </script>
</body>
</html>
